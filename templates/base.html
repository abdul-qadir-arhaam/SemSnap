<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}SemSnap{% endblock %}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>



<style>
body {
font-family: 'Inter', sans-serif;
}
.custom-select {
appearance: none;
background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
background-position: right 0.5rem center;
background-repeat: no-repeat;
background-size: 1.5em 1.5em;
}
</style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen font-display text-slate-900 dark:text-slate-100">

<div class="max-w-[900px] mx-auto px-4 sm:px-6 lg:px-8">

<!-- Header -->
<header class="flex items-center justify-between py-6 border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-2.5">
<div class="bg-primary p-1.5 rounded-lg flex items-center justify-center">
<!-- <span class="material-symbols-outlined text-white text-[20px]">equalizer</span> -->
</div>
<h1 class="text-lg font-bold tracking-tight">SemSnap</h1>
</div>
</header>

<!-- Main Content -->
<main class="py-12 md:py-20">
{% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="py-8 border-t border-slate-200 dark:border-slate-800 text-center">
<p class="text-slate-500 text-sm">
© 2024 SemSnap. Built for students.
</p>
</footer>

</div>
</body>
</html>
