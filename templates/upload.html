{% extends "base.html" %}
{% block title %}SemSnap - Upload{% endblock %}

{% block content %}

<div class="mb-8">
<h2 class="text-3xl font-extrabold mb-2">Upload Semester Results</h2>
<p class="text-slate-500 text-sm">Scheme: {{ scheme }}</p>
</div>

<form method="POST" enctype="multipart/form-data">

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

{% for i in range(1, sem_count + 1) %}
<div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">

<h3 class="text-lg font-bold mb-4">Semester {{ i }}</h3>

<input type="file"
name="sem{{ i }}"
accept=".pdf"
required
class="w-full text-sm file:mr-4 file:py-2 file:px-4
file:rounded-lg file:border-0
file:text-sm file:font-semibold
file:bg-primary file:text-white
hover:file:bg-primary/90">

</div>
{% endfor %}

</div>

<div class="mt-10 flex justify-center">
<button type="submit"
class="px-8 py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg transition-all">
Calculate CGPA
</button>
</div>

</form>

{% endblock %}
