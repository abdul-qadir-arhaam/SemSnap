<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VTU CGPA Calculator - Upload</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
tailwind.config = {
darkMode: "class",
theme: {
extend: {
colors: {
"primary": "#2463eb",
"background-light": "#f6f6f8",
"background-dark": "#111621",
},
fontFamily: {
"display": ["Inter", "sans-serif"]
}
}
}
}
</script>

</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">

<div class="max-w-[900px] mx-auto px-6 py-10">

<!-- Header -->
<header class="flex items-center justify-between mb-8">
<div class="flex items-center gap-3">
<div class="bg-primary p-2 rounded-lg text-white">
<span class="material-symbols-outlined">calculate</span>
</div>
<h1 class="text-xl font-bold tracking-tight">VTU CGPA Calculator</h1>
</div>
</header>

<!-- Page Title -->
<div class="flex flex-col gap-2 mb-8">
<h2 class="text-3xl font-extrabold text-slate-900 dark:text-white">
Upload Semester Results
</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">
Scheme: {{ scheme }}
</p>
</div>

<!-- Upload Form -->
<form method="POST" enctype="multipart/form-data">

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

{% for i in range(1, sem_count + 1) %}
<div class="bg-white dark:bg-slate-900 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow">

<div class="mb-4">
<h3 class="text-lg font-bold">Semester {{ i }}</h3>
<p class="text-xs text-slate-400 uppercase tracking-wide">
Upload PDF Result Sheet
</p>
</div>

<div class="flex flex-col items-center justify-center gap-3 p-6 bg-slate-50 dark:bg-slate-800/50 rounded-lg border border-dashed border-slate-300 dark:border-slate-700 mb-4">
<span class="material-symbols-outlined text-slate-400 text-3xl">
picture_as_pdf
</span>

<input type="file"
name="sem{{ i }}"
accept=".pdf"
required
class="w-full text-sm file:mr-4 file:py-2 file:px-4
file:rounded-lg file:border-0
file:text-sm file:font-semibold
file:bg-primary file:text-white
hover:file:bg-primary/90">
</div>

</div>
{% endfor %}

</div>

<!-- Submit Button -->
<div class="mt-10 flex justify-center">
<button type="submit"
class="px-8 py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all shadow-xl shadow-primary/20 flex items-center gap-2">
<span>Calculate CGPA</span>
<span class="material-symbols-outlined">trending_up</span>
</button>
</div>

</form>

<!-- Footer -->
<footer class="mt-12 pt-8 border-t border-slate-200 dark:border-slate-800 text-center text-slate-500 text-sm">
© 2024 VTU CGPA Calculator. Designed for students.
</footer>

</div>

</body>
</html>
