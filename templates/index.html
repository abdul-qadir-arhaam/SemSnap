{% extends "base.html" %}
{% block title %}SemSnap - Academic Dashboard{% endblock %}

{% block content %}

<div class="text-center mb-12">
<h2 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4">
Calculate Your CGPA
</h2>
<p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto">
Upload your semester result PDFs and get instant SGPA & CGPA.
</p>
</div>

<div class="bg-white dark:bg-slate-900 rounded-[12px] shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-8 md:p-10">

<form method="POST">

<div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">

<div class="space-y-3">
<label class="block text-sm font-semibold">Select Scheme</label>
<div class="relative">
<select name="scheme" required
class="custom-select w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm">
<option disabled selected value="">Choose Scheme</option>
<option value="2022">2022 Scheme</option>
<option value="2025">2025 Scheme</option>
</select>
</div>
</div>

<div class="space-y-3">
<label class="block text-sm font-semibold">Select Semesters</label>
<div class="relative">
<select name="sem_count" required
class="custom-select w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm">
<option disabled selected value="">Number of semesters (1-8)</option>
{% for i in range(1, 9) %}
<option value="{{ i }}">{{ i }} Semester</option>
{% endfor %}
</select>
</div>
</div>

</div>

<div class="flex justify-center">
<button type="submit"
class="min-w-[240px] h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-md transition-all">
Proceed to Upload
</button>
</div>

</form>

</div>
</div>

{% endblock %}
